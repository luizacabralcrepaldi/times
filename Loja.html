<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loja</title>
    <link rel="stylesheet" href="css/Loja.css" />
  </head>
  <body>
    <header class="topo">
      <div class="icone">
        <img src="Bayern.img/logo.png" alt="logo" />
      </div>

      <nav class="navegacao">
        <ul>
          <li><a href="index.html">INÍCIO</a></li>
          <li><a href="times.html">TIMES</a></li>
          <li><a href="loja.html">LOJA</a></li>
        </ul>
      </nav>

      <section class="loja">
        <div class="card-loja">
          <h1>LOJA OFICIAL</h1>

          <p>Faça seu pedido personalizado do seu time favorito.</p>

          <form>
            <div class="campo">
              <label>Produto</label>

              <select>
                <option>Camiseta</option>
                <option>Shorts</option>
                <option>Jaqueta</option>
                <option>Boné</option>
              </select>
            </div>

            <div class="campo">
              <label>Time</label>

              <select>
                <option>Bayern München</option>
                <option>Real Madrid</option>
                <option>Barcelona</option>
                <option>Arsenal</option>
                <option>Milan</option>
                <option>PSG</option>
              </select>
            </div>

            <div class="campo">
              <label>Nome</label>

              <input type="text" placeholder="Digite seu nome" />
            </div>

            <div class="campo">
              <label>Número para contato</label>

              <input type="text" placeholder="(11) 99999-9999" />
            </div>

            <button type="submit">ENVIAR PEDIDO</button>
          </form>
        </div>
      </section>
    </header>
  </body>
</html>
